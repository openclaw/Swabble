name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    defaults:
      run:
        shell: bash
        working-directory: swabble
    steps:
      - name: Checkout swabble
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: swabble

      - name: Select Xcode 26.1 (prefer 26.1.1)
        run: |
          set -euo pipefail
          # pick the newest installed 26.1.x, fallback to newest 26.x
          CANDIDATE="$(ls -d /Applications/Xcode_26.1*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [[ -z "$CANDIDATE" ]]; then
            CANDIDATE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)"
          fi
          if [[ -z "$CANDIDATE" ]]; then
            echo "No Xcode 26.x found on runner" >&2
            exit 1
          fi
          echo "Selecting $CANDIDATE"
          sudo xcode-select -s "$CANDIDATE"
          xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Install tooling
        run: |
          brew update
          brew install swiftlint swiftformat

      - name: Format check
        run: |
          ./scripts/format.sh
          git diff --exit-code

      - name: Lint
        run: ./scripts/lint.sh

      - name: Test
        run: swift test --parallel

      - name: Release build and CLI smoke test
        run: |
          set -euo pipefail
          swift build -c release
          smoke_dir="$RUNNER_TEMP/swabble-smoke"
          config="$smoke_dir/config.json"
          binary=".build/release/swabble"
          test "$("$binary" health)" = "ok"
          test "$("$binary" health --json)" = '{"status":"ok"}'
          "$binary" setup --config "$config"
          test -f "$config"
          test "$(stat -f '%Lp' "$config")" = "600"
          if "$binary" setup --config "$config"; then
            echo "setup unexpectedly replaced an existing config" >&2
            exit 1
          fi
          "$binary" status --config "$config" --json | grep -q '"wakeEnabled":true'
          plutil -replace hook.command -string /usr/bin/true "$config"
          "$binary" test-hook hi --config "$config" | grep -q '^hook invoked$'
          "$binary" --help | grep -q '^Usage: swabble <command>$'
